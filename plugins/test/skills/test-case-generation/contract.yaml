name: test-case-generation
version: "2.1"
description: >
  根据需求文档和澄清结果拆解功能模块，由并行子 Agent 生成各模块用例文件 module_{N}_cases.json，
  并合并出 review 前的中间版本 test_cases.json，可选地走 review 阶段产出评审结果。
  输入需求链接、本地需求文档或上游澄清结果。

input:
  one_of:
    story_link:
      type: string
      description: 需求链接（飞书 Story / 文档链接，或其他可通过脚本获取的 URL）
    requirement_doc:
      type: file
      description: 本地需求文档（AI 对话生成或手动提供的 .md / .json 文件）
  optional:
    clarified_requirements:
      type: file
      description: 上游 requirement-clarification 的澄清结果
      from_upstream: requirement-clarification
    requirement_points:
      type: file
      description: 上游功能点清单
      from_upstream: requirement-clarification
    design_link:
      type: string
      description: Figma 设计稿链接
    confirm_policy:
      type: string
      description: >
        确认策略：accept_all（自动接受所有评审建议，适用于编排器自动化）、
        interactive（默认，用户逐条确认不确定的评审发现）
    re_entry_phase:
      type: string
      description: >
        从指定阶段重新执行（用于需求变更后的迭代更新）。
        合法值：understand | decompose | generate | review。
        默认为空（从 init 开始完整执行）。
    requirement_change_summary:
      type: string
      description: >
        需求变更摘要（配合 re_entry_phase 使用）。
        描述本次变更的内容，用于增量更新时的影响范围判断。

output:
  files:
    # ===== 必产物（每次 session 都会写）=====
    - name: sufficiency_assessment.json
      description: understand 阶段的需求充分性评估结果（4 维度评分 + 置信度上限）
      format: json
    - name: decomposition.md
      description: decompose 阶段的功能模块拆解清单
      format: markdown
    - name: context_summary.md
      description: decompose 阶段的全局上下文摘要（>=3 模块时生成）
      format: markdown
    - name: "module_*_cases.json"
      description: generate 阶段各功能模块的用例文件（N 由模块拆解数决定，由并行子 Agent 写入）
      format: json
      pattern: true
    - name: test_cases.json
      description: generate 收尾时由 Bash 合并 module_*_cases.json 产出的中间用例集（review 前快照）
      format: json
    # ===== 可选产物（仅 review 阶段实际执行时产出）=====
    - name: tc_gen_review.md
      description: review 阶段的 4 维度冗余对评审结果（review 未启用时不产出）
      format: markdown
      optional: true
    - name: review_summary.json
      description: review 阶段的评审摘要统计（用例数/覆盖率/问题数/维度评分）
      format: json
      optional: true
    - name: supplementary_cases.json
      description: output 阶段的补充用例（如有覆盖缺口）
      format: json
      optional: true
  structured:
    total_modules:
      type: number
      description: 模块总数
    total_cases:
      type: number
      description: 生成的用例总数（review 前）
    priority_distribution:
      type: object
      description: 优先级分布 {P0, P1, P2, P3}
    avg_confidence:
      type: number
      description: 用例平均置信度（0-100）
    coverage_rate:
      type: string
      description: 需求覆盖率
    issues_found:
      type: number
      description: 评审发现问题数
    consensus_issues:
      type: number
      description: 两个评审 Agent 一致发现的问题数
    cases_supplemented:
      type: number
      description: 补充用例数
    requirement_sufficiency:
      type: string
      description: 需求充分性（sufficient / partial / insufficient）
    confidence_ceiling:
      type: number
      description: 置信度上限（100 / 70 / 50），由充分性评估决定
    review_mode:
      type: string
      description: 评审模式（single-agent | redundancy-pair）
    user_confirmed_count:
      type: number
      description: 用户确认的问题数

dependencies:
  scripts:
    - shared-tools/scripts/fetch_feishu_doc.py
    - shared-tools/scripts/gitlab_helper.py  # 条件触发：获取技术文档涉及代码时
    - shared-tools/scripts/github_helper.py  # 条件触发：获取技术文档涉及代码时
  env_vars:
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
    - GITLAB_URL      # 条件触发
    - GITLAB_TOKEN    # 条件触发
    - GITHUB_TOKEN    # 条件触发
