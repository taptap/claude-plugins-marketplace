name: metersphere-sync
version: "1.0"
description: >
  将 AI 生成的测试用例同步到 MeterSphere：创建模块、导入用例、创建测试计划、关联用例。
  可选执行验证结果回写（高置信度用例自动标记通过）。
  输入 final_cases.json 或 supplementary_cases.json，输出 ms_sync_report.json。
  触发：同步到 MS、导入 MeterSphere、创建测试计划、MS 同步、执行回写。

input:
  any_of:
    final_cases:
      type: file
      description: 测试用例文件（test-case-generation 产出）
      from_upstream: test-case-generation
    supplementary_cases:
      type: file
      description: 补充用例文件（change-analysis 或 test-case-review 产出）
      from_upstream: [change-analysis, test-case-review]
  optional:
    forward_verification:
      type: file
      description: >
        正向验证结果（requirement-traceability 产出）。每条记录含 case_id、
        requirement_id、result（pass/fail/inconclusive）、confidence。
        execute 模式下用于自动标记 MS 用例执行状态。
      from_upstream: requirement-traceability
    requirement_points:
      type: file
      description: 需求功能点清单（requirement-clarification 产出，用于 FP→TC 桥接匹配）
      from_upstream: requirement-clarification
    smoke_test_report:
      type: file
      description: 冒烟测试报告（requirement-traceability smoke-test 模式产出，含 verdict 和 defect_summary）
      from_upstream: requirement-traceability
    parent_module_id:
      type: string
      description: MeterSphere 用例库父模块 ID（不提供则使用 MS_DEFAULT_NODE_ID）
    plan_name:
      type: string
      description: 测试计划名称（不提供则需用户指定）
    confidence_threshold:
      type: number
      description: >
        【已废弃 v0.0.16】当前 P6 状态映射不再用阈值；pass + ext_deps 非空直接降级为 Prepare。
        如果传入会被 writeback-from-fv 忽略。保留字段定义用于向后兼容老调用方，不影响行为。
      deprecated: true
    mode:
      type: string
      description: >
        执行模式：sync（导入用例 + 创建计划）、
        execute（在 sync 已完成的基础上额外跑 writeback-from-fv，把 fv 写回 plan）

output:
  files:
    - name: ms_sync_report.json
      description: writeback-from-fv 输出（execute 模式产出，含 summary by_target_status / updated / unchanged / failed）
      format: json
      optional: true
    - name: ms_case_mapping.json
      description: 用例 ID 映射 v2（含 generated_at / source_cases_file.sha256 / ms_project_id / entries[{case_id, ms_id, title, module, module_path, import_status}]）
      format: json
    - name: ms_import_report.json
      description: sync 模式 import 阶段的报告（imported / failed / modules_created / mapping_path），与 writeback 的 ms_sync_report.json 永不撞名
      format: json
      optional: true
    - name: ms_plan_info.json
      description: 测试计划信息（plan_id, plan_url）
      format: json
    - name: forward_verification.enriched.json
      description: writeback 后的 fv，每条带 ms_id 字段（execute 模式产出）
      format: json
      optional: true
    - name: pass_with_caveats.md
      description: pass 但需外部验证的条目清单（execute 模式产出，给 QA 看）
      format: markdown
      optional: true
    - name: pending_external_validation.md
      description: 同上数据按依赖类型分组（execute 模式产出）
      format: markdown
      optional: true
  structured:
    imported_count:
      type: number
      description: 成功导入的用例数
    failed_count:
      type: number
      description: 导入失败的用例数
    plan_url:
      type: string
      description: MeterSphere 测试计划链接
    by_target_status:
      type: object
      description: writeback 写回统计 {Pass, Prepare, Failure}（execute 模式）
    pending_external_count:
      type: number
      description: 被降级为 Prepare 等待外部验证的条目数（execute 模式 caveats 报告）

dependencies:
  scripts:
    - shared-tools/scripts/metersphere_helper.py
  env_vars:
    - MS_BASE_URL
    - MS_ACCESS_KEY
    - MS_SECRET_KEY
    - MS_PROJECT_ID
    - MS_WORKSPACE_ID
    - MS_DEFAULT_NODE_ID  # 可选，有默认值
    - MS_PLAN_NODE_ID     # 可选，有默认值
