"scope:github":
  - changed-files:
      - any-glob-to-any-file: ".github/**"

"scope:docs":
  - changed-files:
      - any-glob-to-any-file: "*.md"
      - any-glob-to-any-file: "docs/**"

"scope:tests":
  - changed-files:
      - any-glob-to-any-file: "tests/**"

"scope:meta":
  - changed-files:
      - any-glob-to-any-file: ".agents/**"
      - any-glob-to-any-file: ".claude/**"
      - any-glob-to-any-file: ".claude-plugin/**"
      - any-glob-to-any-file: ".githooks/**"

"scope:plugins":
  - changed-files:
      - any-glob-to-any-file: "plugins/**"

"scope:git":
  - changed-files:
      - any-glob-to-any-file: "plugins/git/**"

"scope:spec":
  - changed-files:
      - any-glob-to-any-file: "plugins/spec/**"

"scope:sync":
  - changed-files:
      - any-glob-to-any-file: "plugins/sync/**"

"maintainer-review":
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"
      - any-glob-to-any-file: ".github/CODEOWNERS"
      - any-glob-to-any-file: ".claude-plugin/**"
      - any-glob-to-any-file: ".claude/rules/versioning.md"
      - any-glob-to-any-file: "tests/validate.sh"
