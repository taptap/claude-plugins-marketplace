name: api-contract-validation
version: "1.0"
description: >
  深度校验前后端 API 契约一致性。输入前端代码变更 + 后端代码变更（或 OpenAPI spec），
  输出 api_contract_report.json。

input:
  one_of:
    frontend_changes:
      type: string[]
      description: 前端 MR/PR 链接列表
    frontend_diff:
      type: file
      description: 前端 diff 文件路径
    frontend_diff_text:
      type: string
      description: 前端 diff 文本内容（直接传入）
  optional:
    backend_changes:
      type: string[]
      description: 后端 MR/PR 链接列表
    backend_diff:
      type: file
      description: 后端 diff 文件路径
    backend_diff_text:
      type: string
      description: 后端 diff 文本内容（直接传入）
    openapi_spec:
      type: file
      description: OpenAPI 规范文件（JSON / YAML），作为三方对比的基准

output:
  files:
    - name: api_contract_report.json
      format: json
      description: API 契约校验报告（逐端点对比结果 + 整体一致性）
  structured:
    overall_consistency:
      type: string
      description: 整体一致性（consistent | inconsistent | partial | N/A）
    checked_endpoints:
      type: number
      description: 被检查的端点总数
    issues_found:
      type: number
      description: 发现的问题总数
    high_severity_count:
      type: number
      description: 高严重度问题数

dependencies:
  scripts:
    - shared-tools/scripts/gitlab_helper.py
    - shared-tools/scripts/github_helper.py
