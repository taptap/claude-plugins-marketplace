name: verification-test-gen
version: "1.0"
description: >
  从需求功能点生成结构化验证用例（具体输入→预期输出），AI 逐条对照代码推理验证需求实现。

input:
  one_of:
    requirement_points:
      type: file
      description: 需求功能点清单（上游 requirement-clarification 产出）
      from_upstream: requirement-clarification
    clarified_requirements:
      type: file
      description: 上游结构化澄清结果（从中提取 functional_points）
      from_upstream: requirement-clarification
  optional:
    story_link:
      type: string
      description: 需求链接（飞书 Story / 文档链接，便捷入口 — 会自动提取功能点作为验证基准）
    code_dir:
      type: string
      description: 代码实现目录路径（目录模式）
    code_diff:
      type: file
      description: 代码变更 diff 文件（git diff 输出、patch 文件等）
    code_diff_text:
      type: string
      description: 直接提供的代码变更文本（粘贴的 diff 内容）
    design_link:
      type: string
      description: Figma 设计稿链接（前端需求时使用，获取 UI 交互数据辅助生成用例）

output:
  files:
    - name: verification_cases.json
      description: 结构化验证用例（含 AI 推理验证结果、代码追踪路径）
      format: json
    - name: verification_report.json
      description: 验证报告（按需求点的覆盖统计、置信度分布和风险评估）
      format: json
  structured:
    total_cases:
      type: number
      description: 验证用例总数
    passed:
      type: number
      description: 通过的用例数
    failed:
      type: number
      description: 失败的用例数
    inconclusive:
      type: number
      description: 待定的用例数（代码不可达或信息不足）
    verification_rate:
      type: string
      description: 验证率（(pass + fail) / total * 100%）
    verification_method:
      type: string
      description: 验证方式（ai_reasoning | executable | hybrid）
    avg_confidence:
      type: number
      description: 平均置信度（0-100）

dependencies:
  scripts:
    - shared-tools/scripts/fetch_feishu_doc.py
    - shared-tools/scripts/gitlab_helper.py
    - shared-tools/scripts/github_helper.py
  env_vars:
    - FEISHU_APP_ID      # 条件触发：获取飞书文档时
    - FEISHU_APP_SECRET  # 条件触发：获取飞书文档时
    - GITLAB_URL         # 条件触发：MR/PR 模式
    - GITLAB_TOKEN       # 条件触发：MR/PR 模式
    - GITHUB_TOKEN       # 条件触发：MR/PR 模式
