name: requirement-clarification
version: "2.0"
description: >
  当收到新需求（链接、文档、口述或碎片化信息）时，通过多维度结构化问答
  与用户拉齐对需求的理解，输出结构化澄清结果和编号功能点清单。

input:
  one_of:
    story_link:
      type: string
      description: 需求链接（飞书 Story / 文档链接，或其他可通过脚本获取的 URL）
    requirement_doc:
      type: file
      description: 本地需求文档（AI 对话生成或手动提供的 .md / .json 文件）
    requirement_text:
      type: string
      description: >
        自由文本形式的需求描述——可以是一句话需求、对话摘要、
        或用户口述的碎片化信息。skill 会基于此内容主动发起澄清问答。
    context_messages:
      type: string[]
      description: >
        历史对话中提取的需求相关片段（由编排层或用户提供），
        可单独作为输入触发探索模式，也可与其他输入组合作为补充上下文。
  optional:
    design_link:
      type: string
      description: >
        Figma 设计稿链接。单独提供（无 one_of 字段）时触发设计稿澄清模式，
        与 story_link / requirement_doc 组合提供时触发文档+设计稿联合澄清。
    platform_scope:
      type: string[]
      description: >
        需求涉及的目标平台列表（如 ["iOS", "Android", "Web", "Server"]）。
        如未提供，skill 会在首轮澄清中主动询问。
    module_relations:
      type: file
      description: 模块关系索引文件（module-relations.json），由 spec 插件的 module-discovery 生成维护

output:
  files:
    - name: clarification_log.md
      description: 澄清过程记录（问题 + 回答 + 结论），供人回看
      format: markdown
    - name: clarified_requirements.json
      description: 结构化澄清结果，含功能点、边界、约束、确认的 Q&A
      format: json
    - name: requirement_points.json
      description: 编号功能点清单，供下游 skill 消费
      format: json
    - name: implementation_brief.json
      description: 面向 coding agent 的实现任务清单，按平台拆分任务并附带 API 契约和依赖图
      format: json
  structured:
    mode:
      type: string
      description: 执行模式（document | design | document+design | exploratory）
    confidence_level:
      type: string
      description: 整体置信度（high | medium | low），探索模式下通常偏低
    story_id:
      type: string
      description: Story 工作项 ID（探索模式下可能为 null）
    total_points:
      type: number
      description: 功能点总数
    confirmed_points:
      type: number
      description: 已完全确认的功能点数
    open_question_count:
      type: number
      description: 未解决问题数（对应 JSON 文件中 open_questions 数组的长度）
    platform_scope:
      type: string[]
      description: 需求涉及的目标平台列表（如 ["iOS", "Server"]）
    coordination_needed:
      type: boolean
      description: 是否需要多端/前后端协调
    analysis_mode:
      type: string
      description: 分析模式（single-agent | multi-perspective）
    perspective_agreement_rate:
      type: string
      description: 多视角一致率（仅 multi-perspective 模式）
    impact_scope_available:
      type: boolean
      description: 是否进行了影响范围分析
    affected_modules_count:
      type: number
      description: 受影响模块总数（直接 + 间接）
    total_tasks:
      type: number
      description: implementation_brief 中的实现任务总数
    api_evidence_level:
      type: string
      description: >
        源材料中 API 相关技术信息的充分程度（sufficient / partial / none）。
        none 时 api_contracts_count 为 0 且报告中跳过 API 契约章节。
    api_contracts_count:
      type: number
      description: 提取的 API 契约总数

dependencies:
  scripts:
    - shared-tools/scripts/fetch_feishu_doc.py
    - shared-tools/scripts/gitlab_helper.py  # 条件触发：需求涉及现有代码时
    - shared-tools/scripts/github_helper.py  # 条件触发：需求涉及现有代码时
  env_vars:
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
    - GITLAB_URL      # 条件触发
    - GITLAB_TOKEN    # 条件触发
    - GITHUB_TOKEN    # 条件触发
